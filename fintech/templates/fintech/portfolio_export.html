{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<div id="content-main">

  <h1>Portfolio Export (JSON)</h1>

  <p style="color: var(--body-quiet-color, #666); margin-bottom: 0.5rem;">
    {{ json_str|length }} Zeichen &nbsp;·&nbsp;
    <a href="#" onclick="copyJson(); return false;">In Zwischenablage kopieren</a>
  </p>

  <textarea
    id="json-export"
    readonly
    spellcheck="false"
    style="
      width: 100%;
      height: 70vh;
      font-family: monospace;
      font-size: 0.85rem;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fafafa;
      resize: vertical;
      box-sizing: border-box;
    "
  >{{ json_str }}</textarea>

  <p id="copy-msg" style="color: #2e7d32; display: none; margin-top: 0.5rem;">
    ✓ In Zwischenablage kopiert
  </p>

</div>

<script>
function copyJson() {
  const ta = document.getElementById('json-export');
  navigator.clipboard.writeText(ta.value).then(function () {
    const msg = document.getElementById('copy-msg');
    msg.style.display = 'block';
    setTimeout(function () { msg.style.display = 'none'; }, 2500);
  });
}
</script>
{% endblock %}
